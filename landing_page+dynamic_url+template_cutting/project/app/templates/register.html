<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- <title>Registration Form</title> -->

  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow p-4">
          <h2 class="text-center mb-4">Registration Form</h2>

          <form action="{% url 'reg_data' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" placeholder="Enter your name"  name="name" value="{{n}}"/>
            </div>
               <h2 style="color: red;">{{msg}}</h2>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="Enter your email" name="email" value="{{e}}"/>
            </div>

            <div class="mb-3">
              <label class="form-label">Contact No.</label>
              <input type="tel" class="form-control" placeholder="Enter contact number" name="contact_no."/>
            </div>
              <h2 style="color: red;">{{msg2}}</h2> 
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="text" class="form-control" placeholder="Enter password"  name="password"/>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm_Password</label>
              <input type="password" class="form-control" placeholder="Enter confirm_password"  name="confirm_password"/>
            </div>

            <div class="mb-3">
              <label class="form-label d-block">Gender</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="male" value="Male" />
                <label class="form-check-label" for="male">Male</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="female" value="Female" />
                <label class="form-check-label" for="female">Female</label>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label d-block">Courses</label>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="html" name="courses" value="HTML" />
                <label class="form-check-label" for="html">HTML</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="css" name="courses" value="CSS" />
                <label class="form-check-label" for="css">CSS</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="js" name="courses" value="JavaScript" />
                <label class="form-check-label" for="js">JavaScript</label>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Qualification</label>
              <select class="form-select" name="qualification">
                <option selected disabled>Select qualification</option>
                <option value="10th">10th</option>
                <option value="12th">12th</option>
                <option value="Graduate">Graduate</option>
                <option value="Post Graduate">Post Graduate</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Resume</label>
              <input type="file" class="form-control" accept=".pdf" name="resume" />
            </div>

            <div class="mb-3">
              <label class="form-label">Profile Pic</label>
              <input type="file" class="form-control" accept=".png,.jpeg,.jpg,.jfif" name="profile_pic" />
            </div>

            <div class="mb-3">
              <label class="form-label">DOB</label>
              <input type="date" class="form-control" accept="dob" name="dob"/>
            </div>

            <div class="mb-3">
              <label class="form-label">Registered Date-Time</label>
              <input type="datetime-local" class="form-control" name="registered_date_time" />
            </div>

            <div class="mb-3">
              <label class="form-label">Registered Time</label>
              <input type="time" class="form-control" name="registered_time" />
            </div>

            <div class="mb-3">
              <label class="form-label">Search</label>
              <input type="search" class="form-control" placeholder="Search here" />
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

{% endblock content %}
